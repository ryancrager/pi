<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>RyanOS</title>
  <link rel="stylesheet" href="css/ryanos.css" />
</head>
<body>
  <main class="dashboard-shell">
    <header class="ryanos-header" aria-label="RyanOS clock">
      <div class="day" id="mainDay">Loading</div>
      <div class="date" id="mainDate">Loading date</div>
      <div class="main-time" id="mainTime">--:--</div>
    </header>

    <section class="tile-grid-main" id="tileGrid" aria-label="RyanOS module grid"></section>

    <footer class="ryanos-footer">RYANOS v1.0</footer>
  </main>

  <script>
    /* ==========================================================
       RYANOS v1.0 CONFIGURATION

       This is the main control panel.
       Change true / false to show or hide modules.

       Do not edit the dashboard grid below. It is built automatically.
    ========================================================== */

    window.RYANOS_VERSION = "1.0";

    window.RYANOS_MODULES = {
      "weather-a": true,
      "weather-b": true,
      "weather-c": true,

      "flights": true,
      "retirement": true,
      "chester": true,

      "seven": true,
      "eight": true,
      "nine": true
    };

    /* ==========================================================
       TILE REGISTRY

       These names are stable. If Weather A changes from Omaha to
       Phoenix, keep the filename weather-a.html and edit only:

       tiles/weather-a.html
    ========================================================== */

    window.RYANOS_TILES = [
      { id: "weather-a", title: "Weather A", file: "tiles/weather-a.html" },
      { id: "weather-b", title: "Weather B", file: "tiles/weather-b.html" },
      { id: "weather-c", title: "Weather C", file: "tiles/weather-c.html" },

      { id: "flights", title: "Flights", file: "tiles/flights.html" },
      { id: "retirement", title: "Retirement", file: "tiles/retirement.html" },
      { id: "chester", title: "Mayor Chester", file: "tiles/chester.html" },

      { id: "seven", title: "Seven", file: "tiles/seven.html" },
      { id: "eight", title: "Eight", file: "tiles/eight.html" },
      { id: "nine", title: "Nine", file: "tiles/nine.html" }
    ];
  </script>
  <script src="scripts/dashboard.js"></script>
</body>
</html>
